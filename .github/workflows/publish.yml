name: Publish

on:
  workflow_call:
    inputs:
      version:
        description: Version tag to release, for example v1.0.0
        required: true
        type: string
      prerelease:
        description: Mark this release as a prerelease
        required: true
        type: boolean
      previous_tag:
        description: Previous version tag. Leave empty to auto-detect.
        required: false
        type: string
        default: ''

jobs:
  publish:
    name: Publish ${{ inputs.version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Validate version and resolve previous tag
        id: version
        uses: ./.github/actions/resolve-version
        with:
          version: ${{ inputs.version }}
          previous_tag: ${{ inputs.previous_tag }}

      - name: Validate changelog entry
        run: |
          release_version="${VERSION#v}"

          if ! grep -q "^## $release_version - " CHANGELOG.md; then
            echo "CHANGELOG.md does not contain an entry for $release_version"
            exit 1
          fi
        env:
          VERSION: ${{ inputs.version }}

      - name: Generate release notes
        run: |
          args=(
            -X POST
            "repos/$GITHUB_REPOSITORY/releases/generate-notes"
            -f "tag_name=$VERSION"
            -f "target_commitish=$GITHUB_SHA"
            -f "configuration_file_path=.github/release.yml"
            --jq ".body"
          )

          if [[ -n "$PREVIOUS_TAG" ]]; then
            args+=(-f "previous_tag_name=$PREVIOUS_TAG")
          fi

          gh api "${args[@]}" > /tmp/release-notes.md
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          PREVIOUS_TAG: ${{ steps.version.outputs.previous_tag }}

      - name: Create and push tag
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"
        env:
          VERSION: ${{ inputs.version }}

      - name: Create GitHub release
        run: |
          args=(
            "$VERSION"
            --title "$VERSION"
            --notes-file /tmp/release-notes.md
          )

          if [[ "$PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi

          gh release create "${args[@]}"
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          PRERELEASE: ${{ inputs.prerelease }}
