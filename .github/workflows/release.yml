name: Release

on:
  pull_request:
    types:
      - closed
    branches:
      - master
  workflow_dispatch:
    inputs:
      action:
        description: Prepare a changelog PR or publish a merged release
        required: true
        default: prepare
        type: choice
        options:
          - prepare
          - publish
      version:
        description: Version tag to release, for example v1.0.0
        required: true
        type: string
      previous_tag:
        description: Previous version tag. Leave empty for the first release.
        required: false
        type: string
      prerelease:
        description: Mark this release as a prerelease
        required: true
        default: false
        type: boolean
      auto_merge:
        description: Automatically merge the changelog PR after required checks pass
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ inputs.version || github.event.pull_request.head.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release PR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.action == 'prepare' }}

    steps:
      - name: Require release token
        run: |
          if [[ -z "$RELEASE_TOKEN" ]]; then
            echo "RELEASE_TOKEN secret is required for automatic release PR creation."
            echo "Create a fine-grained personal access token with Contents, Pull requests, and Issues read/write permissions."
            exit 1
          fi
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Validate version and resolve previous tag
        id: version
        uses: ./.github/actions/resolve-version
        with:
          version: ${{ inputs.version }}
          previous_tag: ${{ inputs.previous_tag }}

      - name: Generate release notes
        run: |
          args=(
            -X POST
            "repos/$GITHUB_REPOSITORY/releases/generate-notes"
            -f "tag_name=$VERSION"
            -f "target_commitish=$GITHUB_SHA"
            -f "configuration_file_path=.github/release.yml"
            --jq ".body"
          )

          if [[ -n "$PREVIOUS_TAG" ]]; then
            args+=(-f "previous_tag_name=$PREVIOUS_TAG")
          fi

          gh api "${args[@]}" > /tmp/release-notes.md
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          VERSION: ${{ inputs.version }}
          PREVIOUS_TAG: ${{ steps.version.outputs.previous_tag }}

      - name: Update changelog
        run: node .github/scripts/update-changelog.mjs
        env:
          VERSION: ${{ inputs.version }}

      - name: Create release branch
        run: |
          branch="changelog/${VERSION}"
          git switch -c "$branch"
          git add CHANGELOG.md

          if git diff --cached --quiet; then
            echo "No changelog changes to commit"
            exit 1
          fi

          git commit -m "Update changelog for $VERSION"
          git push --force-with-lease origin "$branch"
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          VERSION: ${{ inputs.version }}

      - name: Create pull request
        id: create-pr
        run: |
          gh label create skip-changelog \
            --description "Exclude this PR from generated release notes" \
            --color "ededed" \
            --force || true

          body="$(cat <<BODY
          This PR updates CHANGELOG.md for $VERSION.

          After this PR is merged, run the Release workflow again with:

          - action: publish
          - version: $VERSION
          - previous_tag: $PREVIOUS_TAG
          - prerelease: $PRERELEASE

          BODY
          )"

          pr_url="$(gh pr create \
            --base "$GITHUB_REF_NAME" \
            --head "changelog/$VERSION" \
            --title "Release $VERSION" \
            --body "$body" \
            --label skip-changelog)"

          echo "url=$pr_url" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          VERSION: ${{ inputs.version }}
          PREVIOUS_TAG: ${{ steps.version.outputs.previous_tag }}
          PRERELEASE: ${{ inputs.prerelease }}

      - name: Enable auto-merge
        if: ${{ inputs.auto_merge && steps.create-pr.outputs.url != '' }}
        run: |
          if gh pr merge --auto --merge "$PR_URL"; then
            {
              echo "## Auto-merge enabled"
              echo
              echo "$PR_URL will merge after required checks pass."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "## Auto-merge could not be enabled"
            echo
            echo "Enable repository auto-merge, or merge the PR manually after checks pass:"
            echo
            echo "$PR_URL"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          PR_URL: ${{ steps.create-pr.outputs.url }}

  publish:
    name: Publish release
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.action == 'publish' }}
    uses: ./.github/workflows/publish.yml
    with:
      version: ${{ inputs.version }}
      prerelease: ${{ inputs.prerelease }}
      previous_tag: ${{ inputs.previous_tag }}
    secrets: inherit

  resolve-version:
    name: Resolve version from merged PR
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'changelog/v') }}
    outputs:
      version: ${{ steps.version.outputs.value }}
      prerelease: ${{ steps.version.outputs.prerelease }}

    steps:
      - name: Resolve version
        id: version
        run: |
          version="${HEAD_REF#changelog/}"
          prerelease=false

          if [[ "$version" == *-* ]]; then
            prerelease=true
          fi

          echo "value=$version" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}

  publish-after-merge:
    name: Publish merged release PR
    needs: resolve-version
    uses: ./.github/workflows/publish.yml
    with:
      version: ${{ needs.resolve-version.outputs.version }}
      prerelease: ${{ needs.resolve-version.outputs.prerelease == 'true' }}
    secrets: inherit
